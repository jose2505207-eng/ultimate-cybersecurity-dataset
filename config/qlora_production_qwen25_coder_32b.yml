model:
  name: Qwen/Qwen2.5-Coder-32B-Instruct
  trust_remote_code: true
  local_files_only: false
  max_seq_length: 512
  attn_implementation: sdpa

dataset:
  source: outputs/sft_dataset/qwen_cyber_sft_v2_production_50k
  train_rows: 31852
  eval_rows: 9113
  seed: 42
  max_input_chars: 3500

qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/qlora/qwen25_coder_32b_production_r16_512_step8000
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.00005
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 0.3
  max_steps: 8000
  logging_steps: 1
  eval_every: 100
  eval_batches: 16
  checkpoint_every: 100
  checkpoint_keep_latest: 3
  resume_from_checkpoint: true
  save_strategy: steps
  eval_strategy: steps
  save_total_limit: 3
  optim: adamw_torch
  gradient_checkpointing: true
  low_cpu_mem_usage: true
  validation_max_new_tokens: 96
  report_to: []

artifact_sync:
  enabled: true
  push: true
  remote: origin
  branch: main
  run_name: qwen25_coder_32b_production_r16_512_step8000
  report_dir: reports/qwen32b_runs/qwen25_coder_32b_production_r16_512_step8000
