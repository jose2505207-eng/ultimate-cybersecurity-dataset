model:
  name: Qwen/Qwen2.5-Coder-7B-Instruct
  trust_remote_code: true
  local_files_only: false
  max_seq_length: 512
  attn_implementation: sdpa

dataset:
  source: auto
  train_rows: 8
  eval_rows: 4
  seed: 42
  max_input_chars: 3500
  gold_build_max_rows: 256

qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/qlora/qwen25_coder_7b_local_validation
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  weight_decay: 0.0
  warmup_ratio: 0.0
  max_grad_norm: 0.3
  logging_steps: 1
  save_strategy: epoch
  eval_strategy: epoch
  save_total_limit: 2
  optim: paged_adamw_8bit
  gradient_checkpointing: true
  low_cpu_mem_usage: true
  report_to: []

